<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Scroll-Bound Scrubbing | Rockstar Test</title>
    <style>
        :root {
            --bg-color: #000000;
            --accent-color: #66bb99;
            --text-color: #ffffff;
            --font-stack: "SF Pro Display", "Inter", system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-stack);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -webkit-text-size-adjust: 100%;
            width: 100vw;
            height: 100vh;
        }

        .scroll-container {
            position: relative;
            width: 100%;
        }

        .video-section {
            position: relative;
            height: 400vh;
            width: 100%;
        }

        .video-wrapper {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
        }

        /* Fallback video element (hidden, used for data only) */
        video {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            visibility: hidden;
            pointer-events: none;
        }

        .scroll-indicator {
            position: fixed;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
            height: 200px;
            width: 2px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .scroll-progress {
            width: 100%;
            height: 0%;
            background: var(--accent-color);
            transition: height 0.1s linear;
        }

        .ui-label {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent-color);
            z-index: 100;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="scroll-container">
        <section class="video-section" id="section-1">
            <div class="video-wrapper">
                <canvas id="canvas-1"></canvas>
                <video id="video-1" muted playsinline preload="auto" crossorigin="anonymous">
                    <source src="2160.09zxlcbb6vg7y.mp4" type="video/mp4">
                </video>
            </div>
        </section>
    </div>

    <div class="scroll-indicator">
        <div class="scroll-progress" id="progress-bar"></div>
    </div>

    <div class="ui-label">Scroll to Scrub</div>

    <script>
        class ScrollScrubber {
            constructor(sectionId, videoId, canvasId) {
                this.section = document.getElementById(sectionId);
                this.video = document.getElementById(videoId);
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                
                // State management
                this.isLoaded = false;
                this.isSeking = false;
                this.targetTime = 0;
                this.currentTime = 0;
                this.videoDuration = 0;
                this.animationFrameId = null;
                
                // Device detection
                this.isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
                this.isSafari = /Safari/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent);
                
                // Resize canvas to match container
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
                
                // Video events
                this.video.addEventListener('loadedmetadata', () => this.onLoadedMetadata());
                this.video.addEventListener('seeked', () => this.onSeeked());
                this.video.addEventListener('seeking', () => { this.isSeeking = true; });
                
                // Initial load for iOS/Safari: play briefly to force GPU decode
                this.initializeVideo();
                
                // Start animation loop
                this.startAnimationLoop();
            }

            resizeCanvas() {
                this.canvas.width = this.canvas.clientWidth * window.devicePixelRatio;
                this.canvas.height = this.canvas.clientHeight * window.devicePixelRatio;
                this.ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            }

            initializeVideo() {
                // For iOS/Safari: play briefly to force initial frame decode
                if (this.isIOS || this.isSafari) {
                    const playPromise = this.video.play();
                    if (playPromise !== undefined) {
                        playPromise
                            .then(() => {
                                // Pause after a tiny bit to lock in the first frame
                                setTimeout(() => {
                                    this.video.pause();
                                    this.video.currentTime = 0;
                                }, 50);
                            })
                            .catch(error => {
                                console.warn('Video autoplay blocked:', error);
                            });
                    }
                }
            }

            onLoadedMetadata() {
                this.videoDuration = this.video.duration;
                this.isLoaded = true;
                this.drawFrame();
            }

            onSeeked() {
                this.isSeeking = false;
                this.currentTime = this.video.currentTime;
                this.drawFrame();
            }

            drawFrame() {
                if (!this.isLoaded) return;
                
                try {
                    // Fill background
                    this.ctx.fillStyle = '#000000';
                    this.ctx.fillRect(0, 0, this.canvas.clientWidth, this.canvas.clientHeight);
                    
                    // Draw video frame if ready
                    if (this.video.readyState >= 2) {
                        const canvasWidth = this.canvas.clientWidth;
                        const canvasHeight = this.canvas.clientHeight;
                        const videoAspect = this.video.videoWidth / this.video.videoHeight;
                        const canvasAspect = canvasWidth / canvasHeight;
                        
                        let drawWidth, drawHeight, drawX, drawY;
                        
                        if (videoAspect > canvasAspect) {
                            // Video is wider, fit to height
                            drawHeight = canvasHeight;
                            drawWidth = canvasHeight * videoAspect;
                            drawX = (canvasWidth - drawWidth) / 2;
                            drawY = 0;
                        } else {
                            // Video is taller, fit to width
                            drawWidth = canvasWidth;
                            drawHeight = canvasWidth / videoAspect;
                            drawX = 0;
                            drawY = (canvasHeight - drawHeight) / 2;
                        }
                        
                        this.ctx.drawImage(this.video, drawX, drawY, drawWidth, drawHeight);
                    }
                } catch (error) {
                    console.warn('Canvas draw error (expected on iOS cross-origin):', error);
                }
            }

            startAnimationLoop() {
                const loop = () => {
                    if (!this.isLoaded) {
                        this.animationFrameId = requestAnimationFrame(loop);
                        return;
                    }

                    // Calculate scroll position within section
                    const rect = this.section.getBoundingClientRect();
                    const scrollPercent = Math.max(0, Math.min(1, -rect.top / (rect.height - window.innerHeight)));
                    
                    // Calculate target time
                    this.targetTime = scrollPercent * this.videoDuration;
                    
                    // Smooth interpolation (lerp)
                    this.currentTime = this.lerp(this.currentTime, this.targetTime, 0.15);
                    
                    // Seek guard: only seek if not already seeking and difference is significant
                    if (!this.isSeeking && Math.abs(this.currentTime - this.video.currentTime) > 0.02) {
                        try {
                            this.video.currentTime = this.currentTime;
                        } catch (error) {
                            console.warn('Seek error:', error);
                        }
                    }
                    
                    // Draw current frame
                    this.drawFrame();
                    
                    // Update global progress bar
                    const totalScroll = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
                    document.getElementById('progress-bar').style.height = (totalScroll * 100) + '%';

                    this.animationFrameId = requestAnimationFrame(loop);
                };

                this.animationFrameId = requestAnimationFrame(loop);
            }

            lerp(start, end, amt) {
                return (1 - amt) * start + amt * end;
            }

            destroy() {
                if (this.animationFrameId) {
                    cancelAnimationFrame(this.animationFrameId);
                }
            }
        }

        // Initialize scrubber
        const scrubber = new ScrollScrubber('section-1', 'video-1', 'canvas-1');

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            scrubber.destroy();
        });

        // Handle visibility changes to pause/resume animation loop
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                scrubber.destroy();
            } else {
                scrubber.startAnimationLoop();
            }
        });
    </script>
</body>
</html>
